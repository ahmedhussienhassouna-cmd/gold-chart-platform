<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Golden Trade</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="authBody">

<div class="authPage">

    <div class="authLeft">
        <div class="authBrand">
            <h1>🟡 Golden Trade</h1>
            <p>Professional Live Trading Platform</p>
        </div>

        <div class="authHeroText">
            <h2>Welcome Back</h2>
            <p>
                Login to access live gold chart, strategy tools,
                group chat, signals and premium analysis.
            </p>
        </div>
    </div>

    <div class="authBox">

        <div class="authLogo">GT</div>

        <h1>Golden Trade</h1>
        <h2>Login to Dashboard</h2>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email Address"
            autocomplete="email"
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            autocomplete="current-password"
        >

        <button type="button" onclick="loginUser()">
            Login
        </button>

        <p>Don't have an account?</p>

        <a href="register.html">
            Create Account
        </a>

    </div>

</div>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>

<!-- Auth -->
<script src="auth.js"></script>

</body>
</html>
