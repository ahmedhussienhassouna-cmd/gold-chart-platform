<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Golden Trade</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="authBody">

<div class="authBox">

    <h1>🟡 Golden Trade</h1>
    <h2>Login</h2>

    <input
        type="email"
        id="loginEmail"
        placeholder="Email"
    >

    <input
        type="password"
        id="loginPassword"
        placeholder="Password"
    >

    <button onclick="loginUser()">
        Login
    </button>

    <p>
        Don't have an account?
    </p>

    <a href="register.html">
        Create Account
    </a>

</div>

<!-- FIREBASE -->
<script type="module" src="firebase.js"></script>

<!-- APP -->
<script src="auth.js"></script>

</body>
</html>
