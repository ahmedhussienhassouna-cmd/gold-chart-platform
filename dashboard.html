<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Trade Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
    <h2>🟡 Golden Trade</h2>

    <div class="profileBox">
        <img src="images/ahmed.jpg" class="profileImage">
        <div class="profileName">Ahmed Hassouna</div>
        <div class="profileTitle">Founder & CEO</div>
    </div>

    <div class="section-title">Assets</div>
    <button onclick="changeAsset('GOLD')">🥇 Gold</button>
    <button onclick="changeAsset('EURUSD')">💶 EUR/USD</button>
    <button onclick="changeAsset('BTCUSD')">₿ Bitcoin</button>

    <div class="section-title">Services</div>
    <button onclick="service('daily')">📊 Analysis</button>
    <button onclick="toggleStrategy()">💰 Strategy</button>
    <button onclick="openAcademy()">🎓 Academy</button>
    <button onclick="service('support')">📍 Support</button>

    <div style="margin-top:auto">
        <button onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="topbar">
    <div id="activeAsset">GOLD</div>
    <div id="priceBox">Golden Trade Live</div>
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
</div>

<div id="chart">

    <!-- TOP CHART TOOLBAR -->
    <div id="chartToolbar" class="chartToolbar">
        <div class="toolbarSymbol">XAUUSD</div>

        <div class="toolbarGroup">
            <button onclick="changeTimeframe('M1')" id="tf-M1">1m</button>
            <button onclick="changeTimeframe('M5')" id="tf-M5">5m</button>
            <button onclick="changeTimeframe('M15')" id="tf-M15">15m</button>
            <button onclick="changeTimeframe('H1')" id="tf-H1">1H</button>
            <button onclick="changeTimeframe('H4')" id="tf-H4">4H</button>
            <button onclick="changeTimeframe('D')" id="tf-D">1D</button>
        </div>

        <div class="toolbarDivider"></div>

        <div class="toolbarGroup">
            <button onclick="zoomIn()">＋</button>
            <button onclick="zoomOut()">－</button>
            <button onclick="resetChart()">Reset</button>
        </div>

        <div class="toolbarDivider"></div>

        <div class="toolbarGroup">
            <button onclick="clearDrawings()">Clear</button>
        </div>
    </div>

    <!-- LEFT DRAWING TOOLS -->
    <div id="drawingToolbar" class="drawingToolbar">

        <button title="Cursor / Crosshair" onclick="setDrawingTool('cursor')" id="tool-cursor">⌖</button>

        <button title="Trend Line" onclick="setDrawingTool('trend')" id="tool-trend">╱</button>

        <button title="Horizontal Line" onclick="setDrawingTool('horizontal')" id="tool-horizontal">━</button>

        <button title="Vertical Line" onclick="setDrawingTool('vertical')" id="tool-vertical">┃</button>

        <button title="Rectangle" onclick="setDrawingTool('rectangle')" id="tool-rectangle">▭</button>

        <button title="Arrow" onclick="setDrawingTool('arrow')" id="tool-arrow">↗</button>

        <button title="Text" onclick="setDrawingTool('text')" id="tool-text">T</button>

        <div class="drawingDivider"></div>

        <button title="Magnet Mode" onclick="toggleMagnet()" id="tool-magnet">🧲</button>

        <button title="Lock Drawings" onclick="toggleLockDrawings()" id="tool-lock">🔒</button>

        <button title="Show / Hide Drawings" onclick="toggleDrawingsVisibility()" id="tool-eye">👁</button>

        <button title="Clear All Drawings" onclick="clearDrawings()" id="tool-delete">🗑</button>

    </div>

    <div id="oandaChart"></div>

    <!-- RIGHT CLICK MENU -->
    <div id="chartContextMenu" class="chartContextMenu">
        <div onclick="setDrawingTool('horizontal')">➖ Horizontal Line</div>
        <div onclick="setDrawingTool('trend')">╱ Trend Line</div>
        <div onclick="setDrawingTool('rectangle')">▭ Rectangle</div>
        <div onclick="setDrawingTool('text')">T Text</div>
        <div onclick="resetChart()">🔄 Reset Chart</div>
        <div onclick="clearDrawings()">🗑 Clear Drawings</div>
    </div>

</div>

<div class="signalBox">
    <h3>Golden Trade Panel</h3>

    <div class="panelSignal">
        <span>Signal</span>
        <p id="signal">Waiting...</p>
    </div>

    <hr style="margin:15px 0;border-color:#222;">

    <h3>📢 Golden Trade Channel</h3>
    <div id="channelBox">Loading channel...</div>
</div>

<div id="academyModal" class="academyModal">
    <div class="academyContent">
        <span class="closeAcademy" onclick="closeAcademy()">✖</span>
        <iframe id="academyVideo" src="" allowfullscreen></iframe>
    </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<script type="module" src="firebase.js"></script>
<script src="app.js?v=80"></script>
<script src="auth.js"></script>

<script>
function logout(){
    localStorage.removeItem("golden_user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
