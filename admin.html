<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Golden Trade Admin</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#151515;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    background:#222;
    color:white;
    border:none;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    background:#ffd700;
    border:none;
    cursor:pointer;
    font-weight:bold;
    border-radius:6px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:15px;
}

.statBox{
    background:#111;
    border:1px solid #333;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.statBox h3{
    color:#ffd700;
    margin:0;
    font-size:28px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th, td{
    border-bottom:1px solid #333;
    padding:10px;
    text-align:left;
    font-size:14px;
}

th{
    color:#ffd700;
}

.vip{
    color:#00ff88;
    font-weight:bold;
}

.free{
    color:#aaa;
}

.expired{
    color:#ff5555;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🟡 Golden Trade Admin</h1>

<div class="card">
    <h2>📊 Platform Stats</h2>

    <div class="stats">
        <div class="statBox">
            <h3 id="totalUsers">0</h3>
            <p>Total Users</p>
        </div>

        <div class="statBox">
            <h3 id="vipUsers">0</h3>
            <p>VIP Users</p>
        </div>

        <div class="statBox">
            <h3 id="freeUsers">0</h3>
            <p>Free Users</p>
        </div>
    </div>
</div>

<div class="card">

<h2>Gold</h2>

<input id="goldHigh" placeholder="Gold High">
<input id="goldLow" placeholder="Gold Low">

</div>

<div class="card">

<h2>EURUSD</h2>

<input id="eurHigh" placeholder="EURUSD High">
<input id="eurLow" placeholder="EURUSD Low">

</div>

<div class="card">

<h2>BTCUSD</h2>

<input id="btcHigh" placeholder="BTCUSD High">
<input id="btcLow" placeholder="BTCUSD Low">

</div>

<button onclick="saveLevels()">SAVE LEVELS</button>

<hr style="margin:30px 0;border-color:#333;">

<div class="card">

<h2>📢 Golden Trade Channel</h2>

<input id="channelTitle" placeholder="Message Title">
<textarea id="channelMessage" placeholder="Write channel message..."></textarea>

<button onclick="sendChannelMessage()">SEND CHANNEL MESSAGE</button>

</div>

<div class="card">
    <h2>👥 Registered Users & Subscriptions</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Subscription</th>
                <th>Status</th>
                <th>VIP Until</th>
                <th>Visits</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="usersTable">
            <tr>
                <td colspan="7">Loading users...</td>
            </tr>
        </tbody>
    </table>
</div>

<script type="module" src="firebase.js"></script>
<script src="admin.js"></script>

</body>
</html>
