<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Golden Trade</title>
<link rel="stylesheet" href="style.css?v=13">
</head>

<body class="authBody">

<div class="authPage">

    <div class="authLeft">
        <div class="authBrand">
            <h1>🟡 Golden Trade</h1>
            <p>Professional Live Trading Platform</p>
        </div>

        <div class="authHeroText">
            <h2>Create Your Account</h2>
            <p>
                Join Golden Trade platform and access live charts,
                strategy tools, premium chat and client dashboard.
            </p>
        </div>
    </div>

    <div class="authBox">
        <div class="authLogo">GT</div>

        <h1>Golden Trade</h1>
        <h2>Create Account</h2>

        <input
            type="text"
            id="registerName"
            placeholder="Full Name"
            autocomplete="name"
        >

        <input
            type="email"
            id="registerEmail"
            placeholder="Email Address"
            autocomplete="email"
        >
        
        <input
    type="tel"
    id="registerPhone"
    placeholder="Phone Number - Example: 01012345678"
    autocomplete="tel"
>
<button type="button" id="sendOtpBtn">
    Send OTP
</button>

<input
    type="text"
    id="registerOtp"
    placeholder="Enter OTP Code"
    autocomplete="one-time-code"
>

        <input
            type="password"
            id="registerPassword"
            placeholder="Password"
            autocomplete="new-password"
        >

     

<button type="button" id="createAccountBtn">
    Create Account
</button>
<div id="recaptcha-container"></div>

        <p>Already have an account?</p>
        <a href="login.html">Login</a>
    </div>

</div>

<script type="module">
import "./firebase.js?v=5";

    const script = document.createElement("script");
script.src = "auth.js?v=7";
    script.onload = function(){
const btn = document.getElementById("createAccountBtn");

        if(btn){
            btn.addEventListener("click", function(){
                if(typeof registerUser === "function"){
                    registerUser();
                }else{
                    alert("Register system is loading. Please refresh and try again.");
                }
            });
        }
        const otpBtn = document.getElementById("sendOtpBtn");

if(otpBtn){
    otpBtn.addEventListener("click", async function(){

        const phone = document.getElementById("registerPhone").value.trim();

        if(phone === ""){
            alert("Please enter your phone number.");
            return;
        }

        try{
            await window.sendPhoneOtpFirebase(phone);
            alert("OTP has been sent successfully.");
        }catch(error){
            console.error(error);
alert(
    "Code: " + (error.code || "No Code") +
    "\nMessage: " + error.message
);

console.log(error);
console.log(error.code);
console.log(error.message);
        }

    });
}
    };

    document.body.appendChild(script);
</script>

</body>
</html>
