<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Golden Trade</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="authBody">

<div class="authPage">

    <div class="authLeft">
        <div class="authBrand">
            <h1>🟡 Golden Trade</h1>
            <p>Professional Live Trading Platform</p>
        </div>

        <div class="authHeroText">
            <h2>Create Your Account</h2>
            <p>Join Golden Trade platform and access live charts, strategy tools, premium chat and client dashboard.</p>
        </div>
    </div>

    <div class="authBox">
        <div class="authLogo">GT</div>

        <h1>Golden Trade</h1>
        <h2>Create Account</h2>

        <input type="text" id="registerName" placeholder="Full Name">
        <input type="email" id="registerEmail" placeholder="Email Address">
        <input type="password" id="registerPassword" placeholder="Password">

        <label class="authFileLabel">Profile Photo</label>
        <input type="file" id="registerPhoto" accept="image/*" class="authFileInput">

        <button onclick="registerUser()">Create Account</button>

        <p>Already have an account?</p>
        <a href="login.html">Login</a>
    </div>

</div>

<script type="module" src="firebase.js"></script>
<script src="auth.js"></script>

</body>
</html>
