<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Golden Trade</title>
<link rel="stylesheet" href="style.css?v=13">
</head>

<body class="authBody">

<div class="authPage">

    <div class="authLeft">
        <div class="authBrand">
            <h1>🟡 Golden Trade</h1>
            <p>Professional Live Trading Platform</p>
        </div>

        <div class="authHeroText">
            <h2>Create Your Account</h2>
            <p>
                Join Golden Trade platform and access live charts,
                strategy tools, premium chat and client dashboard.
            </p>
        </div>
    </div>

    <div class="authBox">
        <div class="authLogo">GT</div>

        <h1>Golden Trade</h1>
        <h2>Create Account</h2>

        <input
            type="text"
            id="registerName"
            placeholder="Full Name"
            autocomplete="name"
        >

        <input
            type="email"
            id="registerEmail"
            placeholder="Email Address"
            autocomplete="email"
        >
        
        <input
    type="tel"
    id="registerPhone"
    placeholder="Phone Number - Example: 01012345678"
    autocomplete="tel"
>

        <input
            type="password"
            id="registerPassword"
            placeholder="Password"
            autocomplete="new-password"
        >

     

<button type="button">
    Create Account
</button>
<div id="recaptcha-container"></div>

        <p>Already have an account?</p>
        <a href="login.html">Login</a>
    </div>

</div>

<script type="module">
import "./firebase.js?v=3";

    const script = document.createElement("script");
script.src = "auth.js?v=5";
    script.onload = function(){
        const btn = document.querySelector("button");

        if(btn){
            btn.addEventListener("click", function(){
                if(typeof registerUser === "function"){
                    registerUser();
                }else{
                    alert("Register system is loading. Please refresh and try again.");
                }
            });
        }
    };

    document.body.appendChild(script);
</script>

</body>
</html>
