<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Trade Group Chat</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="chatBody">

<div class="chatProPage">

    <div class="chatFullHeader">
        <button class="chatBackBtn" onclick="window.location.href='index.html'">← Dashboard</button>

        <div class="chatFullTitle">
            <div class="chatFullAvatar">GT</div>
            <div>
                <h2>Golden Trade Group Chat</h2>
                <span>● Live Group Chat</span>
            </div>
        </div>

        <div class="chatUserBadge" id="chatUserBadge">Client</div>
    </div>

    <div class="chatFullMessages" id="chatFullMessages">
        <div class="chatLoading">Loading chat...</div>
    </div>

    <div class="chatFullInput">
        <button class="chatPlusBtn">＋</button>
        <input id="chatFullInput" placeholder="Write a message...">
        <button class="chatSendBtn" onclick="sendFullChatMessage()">➤</button>
    </div>

</div>

<script type="module" src="firebase.js"></script>
<script src="chat.js"></script>

</body>
</html>
