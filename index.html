<!DOCTYPE html>
<html>
<head>
  <title>Golden Trade Platform</title>
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* HEADER */
    #header {
      height: 55px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      color: white;
      border-bottom: 1px solid #222;
    }

    #brand {
      font-weight: bold;
      letter-spacing: 1px;
      color: gold;
    }

    /* SIDEBAR */
    #sidebar {
      position: absolute;
      top: 55px;
      left: 0;
      width: 160px;
      bottom: 0;
      background: #0f0f0f;
      border-right: 1px solid #222;
      padding: 10px;
    }

    .btn {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 13px;
    }

    .btn:hover {
      background: #2a2a2a;
    }

    /* CHART */
    #chart {
      position: absolute;
      top: 55px;
      left: 160px;
      right: 0;
      bottom: 0;
    }

    /* WATERMARK */
    #watermark {
      position: fixed;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      color: white;
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="header">
  <div id="brand">GOLDEN TRADE</div>
  <div>Live Gold Platform</div>
</div>

<div id="sidebar">
  <button class="btn" onclick="loadSymbol('XAUUSD')">Gold</button>
  <button class="btn" onclick="loadSymbol('EURUSD')">EURUSD</button>
  <button class="btn" onclick="loadSymbol('BTCUSD')">BTCUSD</button>
</div>

<div id="chart"></div>

<div id="watermark">GOLDEN TRADE</div>

<script>
let widget;

function loadSymbol(symbol) {
  document.getElementById("chart").innerHTML = "";

  widget = new TradingView.widget({
    container_id: "chart",
    width: "100%",
    height: "100%",
    symbol: symbol,
    interval: "15",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",
    enable_publishing: false,
    allow_symbol_change: true,
    studies: [
      "RSI@tv-basicstudies",
      "Moving Average@tv-basicstudies"
    ]
  });
}

window.onload = function () {
  loadSymbol("XAUUSD");
};
</script>

</body>
</html>
