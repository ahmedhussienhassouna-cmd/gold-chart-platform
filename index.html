<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Trade Platform</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>🟡 Golden Trade</h2>

    <div class="section-title">Assets</div>

    <button onclick="changeAsset('GOLD')">🥇 Gold</button>
    <button onclick="changeAsset('EURUSD')">💶 EUR/USD</button>
    <button onclick="changeAsset('BTCUSD')">₿ Bitcoin</button>

    <div class="section-title">Services</div>

    <button onclick="service('daily')">📊 التحليل اليومي</button>
    <button onclick="service('strategy')">💰 إستراتيجية فلوس</button>
    <button onclick="service('support')">📍 الدعم</button>
    <button onclick="service('settings')">⚙️ Settings</button>

</div>

<!-- TOPBAR -->
<div class="topbar">
    <div id="activeAsset">GOLD</div>
    <div id="priceBox">Loading...</div>
</div>

<!-- CHART -->
<div id="chart"></div>

<!-- RIGHT PANEL -->
<div class="signalBox">
    <h3>Panel</h3>
    <p id="signal">Waiting...</p>
</div>

<script src="app.js"></script>

</body>
</html>
