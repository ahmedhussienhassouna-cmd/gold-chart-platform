<script>
let widget;

// IB levels
let ibHigh = 2350;
let ibLow = 2335;

// state
let brokeHigh = false;
let brokeLow = false;

// fake price simulation (لاحقًا نربطه بالسوق الحقيقي)
function getPrice() {
  return 2330 + Math.random() * 40;
}

// تحويل النقاط (تقريب الذهب)
function pointsMove(entry, current) {
  return Math.abs(current - entry) * 10;
}

let breakoutPrice = null;

// منطق الاستراتيجية
function checkStrategy() {
  let price = getPrice();

  // 🔵 breakout up
  if (!brokeHigh && price > ibHigh) {
    brokeHigh = true;
    breakoutPrice = price;
    console.log("Break High");
  }

  // 🔴 breakout down
  if (!brokeLow && price < ibLow) {
    brokeLow = true;
    breakoutPrice = price;
    console.log("Break Low");
  }

  // 🔵 BUY setup (retouch)
  if (brokeHigh) {
    let move = pointsMove(breakoutPrice, price);

    if (move >= 70 && move <= 100 && price <= ibHigh + 2) {
      showSignal("BUY 🔵 (Retest IB High)");
      reset();
    }
  }

  // 🔴 SELL setup
  if (brokeLow) {
    let move = pointsMove(breakoutPrice, price);

    if (move >= 70 && move <= 100 && price >= ibLow - 2) {
      showSignal("SELL 🔴 (Retest IB Low)");
      reset();
    }
  }
}

function reset() {
  brokeHigh = false;
  brokeLow = false;
  breakoutPrice = null;
}

// عرض الإشارة
function showSignal(text) {
  let box = document.getElementById("signal");
  if (box) {
    box.innerHTML = text;
    box.style.color = text.includes("BUY") ? "#00ff7f" : "#ff4d4d";
  }
}

// تشغيل الاستراتيجية
window.onload = function () {
  setInterval(checkStrategy, 3000);
};
</script>
