<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Trade Platform</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

<h2>🟡 Golden Trade</h2>

<!-- Symbols -->
<button onclick="loadSymbol('XAUUSD')">🥇 Gold</button>
<button onclick="loadSymbol('EURUSD')">💶 EURUSD</button>
<button onclick="loadSymbol('BTCUSD')">₿ BTCUSD</button>

<hr>

<!-- Tools -->
<button onclick="signals()">📊 Signals</button>
<button onclick="liquidity()">📉 Liquidity</button>
<button onclick="priceAction()">📐 Price Channel</button>
<button onclick="poc()">🎯 Moving POC</button>
<button onclick="settings()">⚙️ Settings</button>

</div>

<!-- Topbar -->
<div class="topbar">
<div>🟢 LIVE</div>
<div id="priceBox">Loading...</div>
</div>

<!-- 🔥 CANVAS CHART (بديل TradingView) -->
<canvas id="chartCanvas"></canvas>

<!-- Signal Box -->
<div class="signalBox">
<h3>Today's Signal</h3>
<p id="signal">Waiting...</p>
</div>

<script src="app.js"></script>

</body>
</html>
