<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Trade Platform</title>

<link rel="stylesheet" href="style.css">

<!-- Lightweight Charts -->
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<div class="sidebar">
<h2>🟡 Golden Trade</h2>

<button onclick="loadSymbol('XAUUSD')">🥇 Gold</button>
<button onclick="loadSymbol('EURUSD')">💶 EURUSD</button>
<button onclick="loadSymbol('BTCUSD')">₿ BTCUSD</button>

<hr>

<button onclick="signals()">📊 Signals</button>
<button onclick="liquidity()">📉 Liquidity</button>

</div>

<div class="topbar">
<div>🟢 LIVE</div>
<div id="priceBox">Loading...</div>
</div>

<!-- CHART -->
<div id="chart"></div>

<div class="signalBox">
<h3>Signal</h3>
<p id="signal">Waiting...</p>
</div>

<script src="app.js"></script>

</body>
</html>
