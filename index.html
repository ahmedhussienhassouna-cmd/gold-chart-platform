<!DOCTYPE html>
<html>
<head>
  <title>Gold Trading Platform</title>
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0b0b0b;
      font-family: Arial;
    }

    #topbar {
      height: 50px;
      background: #111;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      color: white;
    }

    button {
      background: #222;
      color: white;
      border: 1px solid #333;
      padding: 6px 12px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #chart {
      height: calc(100vh - 50px);
    }
  </style>
</head>

<body>

<div id="topbar">
  <button onclick="loadSymbol('XAUUSD')">Gold</button>
  <button onclick="loadSymbol('EURUSD')">EURUSD</button>
  <button onclick="loadSymbol('BTCUSD')">BTC</button>
</div>

<div id="chart"></div>

<script>
let widget;

function loadSymbol(symbol) {
  document.getElementById("chart").innerHTML = "";

  widget = new TradingView.widget({
    container_id: "chart",
    width: "100%",
    height: "100%",
    symbol: symbol,
    interval: "15",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",
    enable_publishing: false,
    allow_symbol_change: true
  });
}

window.onload = function () {
  loadSymbol("XAUUSD");
};
</script>

</body>
</html>
