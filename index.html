<!DOCTYPE html>
<html>
<head>
  <title>Golden Trade Platform</title>

  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
      font-family: Arial;
      overflow: hidden;
    }

    #chart {
      position: absolute;
      top: 0;
      left: 160px;
      right: 0;
      bottom: 0;
    }

    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 160px;
      bottom: 0;
      background: #111;
      padding: 10px;
    }

    .btn {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #222;
      color: white;
      border: 0;
      cursor: pointer;
    }

    #signal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 15px;
      border: 1px solid #444;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <button class="btn" onclick="loadSymbol('XAUUSD')">Gold</button>
  <button class="btn" onclick="loadSymbol('EURUSD')">EURUSD</button>
  <button class="btn" onclick="loadSymbol('BTCUSD')">BTCUSD</button>
</div>

<div id="chart"></div>

<div id="signal">Waiting...</div>

<script>
let widget;

function loadSymbol(symbol) {
  try {
    document.getElementById("chart").innerHTML = "";

    widget = new TradingView.widget({
      container_id: "chart",
      width: "100%",
      height: "100%",
      symbol: symbol,
      interval: "15",
      timezone: "Etc/UTC",
      theme: "dark",
      style: "1",
      locale: "en",
      allow_symbol_change: true,
      enable_publishing: false
    });

  } catch (e) {
    console.log("TradingView error:", e);
    document.getElementById("signal").innerText = "Chart failed to load";
  }
}

// simple test signal (بدون استراتيجية دلوقتي عشان نتأكد الصفحة شغالة)
setInterval(() => {
  let box = document.getElementById("signal");
  box.innerText = "System Running ✔";
}, 2000);

window.onload = function () {
  loadSymbol("XAUUSD");
};
</script>

</body>
</html>
