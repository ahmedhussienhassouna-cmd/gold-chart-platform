<!DOCTYPE html>
<html>
<head>
  <title>Gold Chart</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body style="margin:0">

<div id="chart" style="height:100vh;"></div>

<script>
new TradingView.widget({
  container_id: "chart",
  width: "100%",
  height: "100%",
  symbol: "XAUUSD",
  interval: "15",
  timezone: "Etc/UTC",
  theme: "dark",
  style: "1",
  locale: "en",
  enable_publishing: false,
  allow_symbol_change: true
});
</script>

</body>
</html>
