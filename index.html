<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Trade Platform</title>

<link rel="stylesheet" href="style.css">

<!-- Lightweight Charts -->
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<div class="sidebar">

    <h2>🟡 Golden Trade</h2>

    <div class="section-title">Assets</div>

    <button onclick="changeAsset('GOLD')">🥇 Gold</button>
    <button onclick="changeAsset('EURUSD')">💶 EUR/USD</button>
    <button onclick="changeAsset('BTCUSD')">₿ Bitcoin</button>

    <div class="section-title">Services</div>

    <button onclick="service('daily')">📊 Analysis</button>
    <button onclick="toggleStrategy()">💰 Strategy</button>
    <button onclick="toggleLiquidity()">💧 Liquidity</button>
    <button onclick="toggleIB()">📦 IB Zone</button>
    <button onclick="toggleVWAP()">📈 VWAP</button>
    <button onclick="openAcademy()">🎓 Academy</button>
    <button onclick="service('support')">📍 Support</button>
    <button onclick="service('settings')">⚙️ Settings</button>

    <div style="margin-top:auto;">
        <button onclick="logout()">🚪 Logout</button>
    </div>

</div>

<div class="topbar">
    <div id="activeAsset">GOLD</div>
    <div id="priceBox">Loading...</div>
</div>

<div class="timeframes">
    <button onclick="changeTimeframe('1min')">1M</button>
    <button onclick="changeTimeframe('5min')">5M</button>
    <button onclick="changeTimeframe('15min')">15M</button>
    <button onclick="changeTimeframe('30min')">30M</button>
    <button onclick="changeTimeframe('1h')">1H</button>
    <button onclick="changeTimeframe('4h')">4H</button>
    <button onclick="changeTimeframe('1day')">1D</button>
</div>

<div id="chart"></div>

<div class="signalBox">

    <h3>Golden Trade Panel</h3>

    <div class="panelRow">
        <span>Asset</span>
        <b id="panelAsset">GOLD</b>
    </div>

    <div class="panelRow">
        <span>Session</span>
        <b id="panelSession">Loading</b>
    </div>

    <div class="panelRow">
        <span>Strategy</span>
        <b id="panelStrategy">OFF</b>
    </div>

    <div class="panelRow">
        <span>Liquidity</span>
        <b id="panelLiquidity">OFF</b>
    </div>

    <div class="panelRow">
        <span>IB Zone</span>
        <b id="panelIB">OFF</b>
    </div>

    <div class="panelRow">
        <span>VWAP</span>
        <b id="panelVWAP">OFF</b>
    </div>

    <div class="panelSignal">
        <span>Signal</span>
        <p id="signal">Waiting...</p>
    </div>

</div>

<!-- Academy Modal -->
<div id="academyModal" class="academyModal">

    <div class="academyContent">

        <span class="closeAcademy" onclick="closeAcademy()">✖</span>

        <iframe
            id="academyVideo"
            width="100%"
            height="500"
            src=""
            title="Golden Trade Academy"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>

    </div>

</div>

<script>

function openAcademy(){

    document.getElementById("academyModal").style.display = "flex";

    document.getElementById("academyVideo").src =
    "https://www.youtube.com/embed/Nu4DzhRLRSI?autoplay=1";
}

function closeAcademy(){

    document.getElementById("academyModal").style.display = "none";

    document.getElementById("academyVideo").src = "";
}

</script>

<script src="app.js"></script>
<script src="auth.js"></script>

</body>
</html>
