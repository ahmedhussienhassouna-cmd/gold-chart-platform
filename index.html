<!DOCTYPE html>
<html>
<head>
  <title>Gold Chart</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }
    #chart {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="chart"></div>

<script>
window.addEventListener("load", function () {
  new TradingView.widget({
    container_id: "chart",
    width: "100%",
    height: "100%",
    symbol: "XAUUSD",
    interval: "15",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",
    enable_publishing: false,
    allow_symbol_change: true
  });
});
</script>

</body>
</html>
