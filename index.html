<!DOCTYPE html>
<html>
<head>
  <title>Golden Trade Platform</title>
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #header {
      height: 55px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      color: white;
      border-bottom: 1px solid #222;
    }

    #brand {
      font-weight: bold;
      letter-spacing: 1px;
      color: gold;
    }

    #sidebar {
      position: absolute;
      top: 55px;
      left: 0;
      width: 160px;
      bottom: 0;
      background: #0f0f0f;
      border-right: 1px solid #222;
      padding: 10px;
    }

    .btn {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 13px;
    }

    .btn:hover {
      background: #2a2a2a;
    }

    #chart {
      position: absolute;
      top: 55px;
      left: 160px;
      right: 0;
      bottom: 0;
    }

    #watermark {
      position: fixed;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      color: white;
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
      font-weight: bold;
    }

    /* 🔥 IB STYLE */
    .ib-line {
      position: absolute;
      left: 160px;
      right: 0;
      height: 2px;
      background: gold;
      z-index: 9999;
    }

    .ib-zone {
      position: absolute;
      left: 160px;
      right: 0;
      background: rgba(255, 215, 0, 0.08);
      z-index: 9998;
    }

    #ib-label {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      border: 1px solid gold;
      color: gold;
      padding: 8px;
      font-size: 12px;
      z-index: 99999;
    }
  </style>
</head>

<body>

<div id="header">
  <div id="brand">GOLDEN TRADE</div>
  <div>Live Gold Platform</div>
</div>

<div id="sidebar">
  <button class="btn" onclick="loadSymbol('XAUUSD')">Gold</button>
  <button class="btn" onclick="loadSymbol('EURUSD')">EURUSD</button>
  <button class="btn" onclick="loadSymbol('BTCUSD')">BTCUSD</button>
</div>

<div id="chart"></div>

<div id="watermark">GOLDEN TRADE</div>

<div id="ib-label">IB Zone Active</div>

<script>
let widget;

// 🔥 IB values (مؤقتة – هنخليها حقيقية لاحقًا)
let ibHigh = null;
let ibLow = null;
let ibActive = false;

// تحديد أول ساعة (UTC)
function isIBTime() {
  const now = new Date();
  return now.getUTCHours() === 0; // أول ساعة من اليوم
}

// حساب IB
function calculateIB() {
  if (!isIBTime()) return;

  if (!ibActive) {
    // محاكاة مبدئية (لاحقًا نربطها بسعر حقيقي)
    ibHigh = 2350 + Math.random() * 15;
    ibLow = ibHigh - (10 + Math.random() * 10);

    ibActive = true;
    drawIB();
  }
}

// رسم IB على الشاشة
function drawIB() {
  document.querySelectorAll(".ib-line, .ib-zone").forEach(e => e.remove());

  let chartHeight = window.innerHeight - 55;

  let highPos = chartHeight * 0.35;
  let lowPos = chartHeight * 0.55;

  let zone = document.createElement("div");
  zone.className = "ib-zone";
  zone.style.top = highPos + "px";
  zone.style.height = (lowPos - highPos) + "px";

  let highLine = document.createElement("div");
  highLine.className = "ib-line";
  highLine.style.top = highPos + "px";

  let lowLine = document.createElement("div");
  lowLine.className = "ib-line";
  lowLine.style.top = lowPos + "px";

  document.body.appendChild(zone);
  document.body.appendChild(highLine);
  document.body.appendChild(lowLine);
}

// TradingView
function loadSymbol(symbol) {
  document.getElementById("chart").innerHTML = "";

  widget = new TradingView.widget({
    container_id: "chart",
    width: "100%",
    height: "100%",
    symbol: symbol,
    interval: "15",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",enable_publishing: false,
    allow_symbol_change: true,
    studies: [
      "RSI@tv-basicstudies",
      "Moving Average@tv-basicstudies"
    ]
  });
}

window.onload = function () {
  loadSymbol("XAUUSD");

  setInterval(() => {
    calculateIB();
  }, 10000); // تحديث كل 10 ثواني
};
</script>

</body>
</html>
