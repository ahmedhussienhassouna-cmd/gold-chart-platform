<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Trade Membership</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#151515;
    border:1px solid #2a2a2a;
    border-radius:20px;
    padding:40px;
    text-align:center;
}

.logo{
    color:#ffd700;
    font-size:38px;
    margin-bottom:15px;
}

.title{
    font-size:30px;
    margin-bottom:15px;
}

.desc{
    color:#bbb;
    margin-bottom:30px;
    line-height:1.7;
}

.plan{
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:15px;
    padding:18px;
    margin-bottom:15px;
    font-size:22px;
}

.month{
    color:#00ff88;
}

.telegramBtn{
    display:block;
    margin-top:30px;
    text-decoration:none;
    background:#ffd700;
    color:black;
    padding:18px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.telegramBtn:hover{
    transform:scale(1.03);
}

.note{
    margin-top:20px;
    color:#999;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

    <div class="desc">

        💎 <span class="month">1 Month</span> - 100$
    </div>

    <div class="plan">
        💎 <span class="month">3 Months</span> - 220$
    </div>

    <div class="plan">
        💎 <span class="month">1 Year</span> - 800$
    </div>

    <div class="plan">
        👑 Lifetime - 1200$
    </div>

    <a
        class="telegramBtn"
        href="https://t.me/yahhhiaajdv"
        target="_blank"
    >
        Contact Us On Telegram
    </a>

    <div class="note">
        Payment details are provided privately through Telegram support.
    </div>

</div>

</body>
</html>
